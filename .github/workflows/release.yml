name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Package the source, the committed compiled plugin (if present) and the
      # config into a ready-to-drop-in zip. AMXX compilation is done locally and
      # the .amxx is committed to the repo — CI just assembles the release.
      - name: Package
        run: |
          mkdir -p out/addons/amxmodx/scripting out/addons/amxmodx/configs/hybridcore
          cp addons/amxmodx/scripting/hybridcore_bridge.sma out/addons/amxmodx/scripting/
          cp addons/amxmodx/configs/hybridcore/config.cfg out/addons/amxmodx/configs/hybridcore/
          if [ -f addons/amxmodx/plugins/hybridcore_bridge.amxx ]; then
            mkdir -p out/addons/amxmodx/plugins
            cp addons/amxmodx/plugins/hybridcore_bridge.amxx out/addons/amxmodx/plugins/
          fi
          cp README.md LICENSE out/
          cd out && zip -r ../hybridcore-bridge-cs16.zip .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: hybridcore-bridge-cs16.zip
          generate_release_notes: true
