// ============================================================
//  HybridCore Bridge — configuration
//  addons/amxmodx/configs/hybridcore/config.cfg
//  (auto-generated on first run; edit and restart the map)
// ============================================================

// Your HybridCore site base URL (no trailing slash).
hc_base_url "https://your-community.com"

// Per-server bridge token from Admin -> Servers -> (server) -> Bridge.
// Starts with hcb_ and is shown only once when generated.
hc_bridge_token "none"

// How often (seconds) to poll the site for new commands. Minimum 2.0.
hc_bridge_interval "5.0"

// 1 = print debug output to the server console.
hc_bridge_debug "0"
